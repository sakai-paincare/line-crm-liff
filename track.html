<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ページを開いています</title>
  <!-- LIFF SDK / LIFF API / 計測先(GAS) への接続を先行して初期化を高速化 -->
  <link rel="preconnect" href="https://static.line-scdn.net">
  <link rel="dns-prefetch" href="https://static.line-scdn.net">
  <link rel="preconnect" href="https://api.line.me">
  <link rel="dns-prefetch" href="https://api.line.me">
  <link rel="preconnect" href="https://script.google.com">
  <link rel="dns-prefetch" href="https://script.google.com">
  <link rel="dns-prefetch" href="https://script.googleusercontent.com">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f0f4f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      color: #445566;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #d5e2e6;
      border-top-color: #2a7d8c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .message { font-size: 15px; letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p class="message">ページを開いています…</p>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    // ============================================================
    // 設定
    // ============================================================
    // 計測用LIFFアプリのID(LINE Loginチャネル「会員証」2010587487 配下)
    var LIFF_ID = '2010587487-x2K8xvER';
    // GASウェブアプリのURL(index.html と同じ。デプロイを作り直したら両方更新)
    var API_URL = 'https://script.google.com/macros/s/AKfycbzh0p2mD8wEo9nGOJpn4bqhZ_7z-JMDU0vspq7iHFfIvEy8PTEniljgL7Vjb9qOxgzm4Q/exec';

    // 遷移先マップ: track.html?d=<キー> で選択。不正なキーはデフォルトへ
    var DESTINATIONS = {
      beauty: 'https://paincare.clinic/%E4%B8%AD%E6%B4%B2%E3%82%A2%E3%83%B3%E3%83%81%E3%82%A8%E3%82%A4%E3%82%B8%E3%83%B3%E3%82%B0labo', // 美容・点滴(中洲アンチエイジングlabo)
    };
    var DEFAULT_DESTINATION = 'https://paincare.clinic/'; // 安全なデフォルト(クリニックHPトップ)

    // ============================================================
    // 遷移先キーの解決
    // liff.line.me/{ID}?d=beauty で開くと、liff.init 完了前は
    // ?liff.state=%3Fd%3Dbeauty の形でパラメータが包まれているため両対応する
    // ============================================================
    function getTargetKey() {
      try {
        var q = new URLSearchParams(location.search);
        var d = q.get('d');
        if (d) return d;
        var state = q.get('liff.state');
        if (state) {
          var inner = new URLSearchParams(String(state).replace(/^[?\/]+/, ''));
          return inner.get('d') || '';
        }
      } catch (e) { /* 解析失敗時はデフォルトへ */ }
      return '';
    }

    // ============================================================
    // リダイレクト(必ず1回だけ実行される。計測より遷移を優先)
    // ============================================================
    var redirected = false;
    function go() {
      if (redirected) return;
      redirected = true;
      var key = getTargetKey();
      location.replace(DESTINATIONS[key] || DEFAULT_DESTINATION);
    }

    // 保険: 3秒経過したら記録の成否に関わらず必ずリダイレクト
    setTimeout(go, 3000);

    // ============================================================
    // 計測送信(投げ捨て)
    // sendBeacon はPOSTのため使わない(GASのdoPost=LINE Webhookと衝突する)。
    // fetch GET + keepalive でページ遷移後も送信が継続されるようにし、
    // fetch非対応環境は Image ピクセル方式にフォールバック。応答は待たない。
    // ============================================================
    function sendTap(uid) {
      var url = API_URL +
        '?t=tap&d=' + encodeURIComponent(getTargetKey()) +
        '&u=' + encodeURIComponent(uid) +
        '&_=' + Date.now(); // キャッシュ回避
      try {
        if (window.fetch) {
          fetch(url, { method: 'GET', mode: 'no-cors', keepalive: true });
          return;
        }
      } catch (e) { /* fallthrough */ }
      try { new Image().src = url; } catch (e) { /* 計測は諦めて遷移 */ }
    }

    // ============================================================
    // メイン: liff.init → getContext().userId(API往復なし) → 送信 → 即遷移
    // ============================================================
    function main() {
      if (typeof liff === 'undefined' || !LIFF_ID) {
        go(); // SDK読込失敗 / LIFF_ID未設定でも遷移は止めない
        return;
      }
      liff.init({ liffId: LIFF_ID })
        .then(function () {
          var ctx = liff.getContext();
          var uid = (ctx && ctx.userId) || '';
          if (uid) sendTap(uid); // UIDが取れないときは計測せず遷移のみ
          go();
        })
        .catch(go); // init失敗でも必ず遷移
    }

    main();
  </script>
</body>
</html>
